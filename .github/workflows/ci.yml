name: CI

# Verification-only: this workflow never deploys anything. Render
# (backend) and Cloudflare Workers (frontend) deploys are handled outside
# of GitHub Actions. The only job here is to fail loudly, before merge,
# if a test breaks or the frontend stops building.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run coupon checkout flow (ad-hoc script)
        run: python test_coupons.py

      - name: Run order integrity suite (idempotency, oversell protection, price tampering)
        run: pytest test_order_integrity.py -v

      - name: Run Razorpay webhook suite
        run: pytest test_razorpay_webhook.py -v

  frontend-build:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (verification only — not the Cloudflare deploy build)
        run: npm run build
        env:
          # Dummy value so the build doesn't fail on a missing var. This
          # workflow never deploys, so it never needs the real API URL.
          NEXT_PUBLIC_API_URL: https://example.invalid
